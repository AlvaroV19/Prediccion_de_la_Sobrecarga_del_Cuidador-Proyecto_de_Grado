<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado</title>
    <style>
        :root { --bg: #f4f7fb; --card: #ffffff; --text: #1f2937; --muted: #6b7280; --primary: #1f6feb; --success: #0f766e; --warning: #b45309; --danger: #b91c1c; --border: #dbe2ea; --shadow: 0 12px 30px rgba(31, 111, 235, 0.10); }
        :root { --bg: #f6f7fb; --card: #ffffff; --text: #1f2937; --muted: #6b7280; --primary: #1f6feb; --border: #dbe2ea; }
        body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); }
        .wrap { max-width: 900px; margin: 0 auto; padding: 32px 18px 48px; }
        .wrap { max-width: 760px; margin: 0 auto; padding: 24px 16px 40px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
        h1 { margin: 0 0 8px; font-size: 30px; }
        .pill { display: inline-block; padding: 8px 12px; border-radius: 999px; font-weight: 700; margin-bottom: 16px; }
        .pill { display: inline-block; padding: 6px 10px; border-radius: 999px; font-weight: 700; margin: 12px 0 16px; }
        .medium { background: #fef3c7; color: #92400e; }
        .high { background: #fee2e2; color: #991b1b; }
        .grid { display: grid; grid-template-columns: repeat(1, minmax(0, 1fr)); gap: 14px; margin-top: 20px; margin-bottom: 20px; }
        .grid { display: grid; gap: 12px; margin-top: 18px; }
        .box { padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border); background: #fafcff; }
        .label { display: block; font-size: 15px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .3px; }
        .value { font-size: 20px; font-weight: 700; }
        .actions { display: block; width: 100%; }
        .actions a {
            display: block;
            width: 100%;
            box-sizing: border-box;
            text-decoration: none;
            border-radius: 12px;
            padding: 12px 18px;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            text-align: center;
            transition: background 0.3s ease;
        }
        @media (max-width: 720px) { .wrap { padding: 16px 12px 28px; } h1 { font-size: 24px; } }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>Resultado de la evaluación</h1>
            <p>Resumen de la predicción generada.</p>
            <div class="grid">
                <div class="box">
                    <span class="label">ID del registro</span>
                    <div class="value">{{ record_id|default:'-' }}</div>
                </div>
                <div class="box">
                    <span class="label">Nivel de riesgo</span>
                    <div class="value">{{ risk_level|default:'-'|title }}</div>
                </div>
                <div class="box">
                    <span class="label">Recomendación</span>
                    <div class="value">{{ recommendation|default:'-' }}</div>
                </div>
            </div>

            <div class="actions">
                <a href="{% url 'main' %}">Volver al formulario</a>
            </div>
        </div>
    </div>
</body>
</html>
