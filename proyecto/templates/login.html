<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Zarit</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #1f6feb;
            --primary-soft: #e8f0fe;
            --border: #dbe2ea;
            --shadow: 0 12px 30px rgba(31, 111, 235, 0.10);
            --success: #0f766e;
            --success-soft: #dcfce7;
            --danger: #b91c1c;
            --danger-soft: #fee2e2;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(31, 111, 235, 0.10), transparent 30%),
                radial-gradient(circle at bottom left, rgba(15, 118, 110, 0.08), transparent 25%),
                var(--bg);
            color: var(--text);
        }
        .shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .layout {
            width: min(1120px, 100%);
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: stretch;
            flex-wrap: wrap;
        }
        .hero, .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }
        .hero {
            padding: 30px;
            position: relative;
            overflow: hidden;
        }
        .hero::after {
            content: '';
            position: absolute;
            right: -100px;
            top: -100px;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(31, 111, 235, 0.16), rgba(31, 111, 235, 0));
            pointer-events: none;
        }
        .eyebrow {
            display: inline-flex;
            padding: 7px 12px;
            border-radius: 999px;
            background: var(--primary-soft);
            color: var(--primary);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .3px;
        }
        h1 {
            margin: 14px 0 12px;
            font-size: 40px;
            line-height: 1.08;
        }
        h2 {
            margin: 0 0 12px;
            font-size: 26px;
        }
        .copy {
            margin: 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.6;
            max-width: 60ch;
        }
        .points {
            display: grid;
            gap: 12px;
            margin-top: 24px;
        }
        .point {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: #fafcff;
        }
        .bullet {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-top: 5px;
            flex: 0 0 auto;
            background: var(--primary);
            box-shadow: 0 0 0 6px rgba(31, 111, 235, 0.10);
        }
        .point strong { display: block; margin-bottom: 3px; }
        .card {
            width: min(520px, 100%);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .card h2 { margin: 0 0 14px; font-size: 34px; line-height: 1.1; }
        .card p { margin: 0 0 22px; color: var(--muted); line-height: 1.65; font-size: 16px; }
        .field { display: grid; gap: 10px; margin-bottom: 18px; }
        .field label { font-size: 15px; font-weight: 700; color: #111827; }
        .field input {
            width: 100%;
            padding: 15px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            font-size: 16px;
            background: #fff;
        }
        .field input:focus {
            outline: 3px solid rgba(31, 111, 235, 0.16);
            border-color: rgba(31, 111, 235, 0.55);
        }
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .actions button, .actions a {
            border: 0;
            border-radius: 16px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
        }
        .actions button { background: var(--primary); color: #fff; }
        .actions a { background: #eef2f7; color: var(--text); }
        .actions button:hover, .actions a:hover { transform: translateY(-1px); }
        .status {
            display: none;
            margin-top: 16px;
            padding: 13px 15px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
        }
        .status.success {
            display: block;
            background: var(--success-soft);
            color: var(--success);
            border: 1px solid rgba(15, 118, 110, 0.18);
        }
        .status.error {
            display: block;
            background: var(--danger-soft);
            color: var(--danger);
            border: 1px solid rgba(185, 28, 28, 0.18);
        }
        .hint {
            margin-top: 16px;
            font-size: 14px;
            color: var(--muted);
            line-height: 1.6;
        }
        .hint code {
            padding: 3px 7px;
            border-radius: 7px;
            background: #eef2f7;
        }
        @media (max-width: 1040px) {
            .layout { flex-direction: column; align-items: center; }
            h1 { font-size: 34px; }
            .card { width: min(560px, 100%); }
        }
        @media (max-width: 720px) {
            .shell { padding: 16px; }
            .hero, .card { padding: 24px; }
            .actions { flex-direction: column; }
            .actions button, .actions a { width: 100%; }
            h1 { font-size: 30px; }
            .card h2 { font-size: 30px; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="layout">

            <section class="card">
                <h2>Acceder</h2>

                <form id="loginForm" method="post" action="{% url 'login' %}" autocomplete="off">
                    {% csrf_token %}
                    <div class="field">
                        <label for="username">Usuario</label>
                        <input id="username" name="username" type="text" placeholder="admin" required>
                    </div>
                    <div class="field">
                        <label for="password">Contraseña</label>
                        <input id="password" name="password" type="password" placeholder="zarit2026" required>
                    </div>
                    <div class="actions">
                        <button type="submit">Entrar</button>
                    </div>
                </form>

                {% if messages %}
                    {% for message in messages %}
                        <div class="status {{ message.tags }}" role="alert">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <div class="hint">Credenciales locales: <code id="userHint">{{ default_username }}</code> / <code id="passHint">{{ default_password }}</code></div>
            </section>
        </div>
    </div>
</body>
</html>
